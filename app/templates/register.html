{% extends 'base.html' %}

{% block title %}Register User{% endblock %}

{% block content%}

<div class="page-content">
	<h1>Register below to create your own played list!</h1>
	<form action="{{url_for('register')}}" method = "POST">
		{{ form.hidden_tag() }}
		{{ form.uname.label }} {{ form.uname() }}
		{{ form.pw.label }} {{ form.pw() }}
		{{ form.submit() }}
	</form>
</div>

{% endblock %}
