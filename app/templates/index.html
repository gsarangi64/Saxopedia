{% extends "base.html" %}

{% block title %}Homepage{% endblock %}

{% block content%}

	<!--Displays flashed message after registering user-->
	{% with messages = get_flashed_messages(with_categories=true) %}
	  {% if messages %}
		{% for category, message in messages %}
		  <div class="alert alert-{{ category }}">
			{{ message }}
		  </div>
		{% endfor %}
	  {% endif %}
	{% endwith %}

<h1>Saxopedia Homepage</h1>

{% endblock %}
